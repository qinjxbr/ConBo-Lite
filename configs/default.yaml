# Reference values; all options can be supplied through demo.py.
input_video: pnv/input.mov
output_dir: outputs
run_name: my_conbo_run
base_frame: 0
start_frame: null
end_frame: null
roi_size: 60
gamma: 5.0
threshold: 120
adaptive_mvgc: true
adaptive_samples_per_second: 20
adaptive_sample_seconds: 1.0
adaptive_sample_start_frame: 0
adaptive_random_seed: 2026
adaptive_min_circularity: 0.85
adaptive_full_validation_candidates: 5
adaptive_exact_validation_candidates: 2
adaptive_search_mode: fast
morphology_size: 3
morphology_shape: ellipse
kernel_size: 60
circular_radius_ratio: 0.5
gaussian_sigma: 10.0
amplification_factor: 15.0
mag_algorithm: phase_reconstruct
phase_min_confidence: 0.20
phase_max_shift_px: 10.0
mag_reconstruction_padding: null
update_strategy: detected
# MAG always overrides the ROI policy to fixed_initial for phase consistency.
device: auto
gpu_min_batch_pixels: 200000
output_fps: null
codec: mp4v
io_acceleration: cpu
write_video: true
output_scale: 1.0
